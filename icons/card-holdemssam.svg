<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Card shape -->
  <rect x="56" y="16" width="400" height="480" rx="32" fill="#f8f8f8"/>
  <rect x="56" y="16" width="400" height="480" rx="32" fill="none" stroke="#ddd" stroke-width="4"/>
  <!-- Center text: H and S bold, rest light -->
  <text x="256" y="240" font-family="Georgia, serif" font-size="76" fill="#1a1a2e" text-anchor="middle">
    <tspan font-weight="bold">H</tspan><tspan font-weight="300">oldem</tspan>
  </text>
  <text x="256" y="330" font-family="Georgia, serif" font-size="76" fill="#1a1a2e" text-anchor="middle">
    <tspan font-weight="bold">S</tspan><tspan font-weight="300">sam</tspan>
  </text>
  <!-- Top-left: Spade -->
  <text x="100" y="92" font-size="36" text-anchor="middle" fill="#1a1a2e">♠</text>
  <!-- Top-right: Heart -->
  <text x="412" y="92" font-size="36" text-anchor="middle" fill="#e63946">♥</text>
  <!-- Bottom-left: Diamond -->
  <text x="100" y="462" font-size="36" text-anchor="middle" fill="#e63946">♦</text>
  <!-- Bottom-right: Club -->
  <text x="412" y="462" font-size="36" text-anchor="middle" fill="#1a1a2e">♣</text>
</svg>
